<head>
    <meta charset="UTF-8">

    <title>M-Approval - Pembukaan Rekening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bpr-primary': '#1E3A8A',
                        'bpr-dark': '#0F172A',
                        'bpr-gray': '#64748B',
                        'bpr-pending': '#F97316',
                        'bpr-approved': '#10B981',
                        'bpr-rejected': '#EF4444',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .mobile-container {
            max-width: 428px;
            margin: 0 auto;
            background: #F9FAFB;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        /* Tab bubble with value inside */
        .tab-bubble {
            background: #F1F5F9;
            transition: all 0.2s ease;
        }
        .tab-bubble.active {
            background: #1E3A8A;
            color: white;
        }
        .tab-bubble.active .tab-count {
            background: rgba(255,255,255,0.25);
            color: white;
        }
        .tab-count {
            background: #E2E8F0;
            color: #1E293B;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
        }
        /* Step line simple */
        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 6px;
        }
        .step-line {
            width: 2px;
            background: #E2E8F0;
        }
        .card-item {
            transition: all 0.15s ease;
        }
        .card-item:active {
            transform: scale(0.98);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .detail-page {
            animation: slideUp 0.3s ease;
        }
        .screen-hidden {
            display: none !important;
        }
       .tab-modern.active {
    color: #1E3A8A;
    border-bottom: 2px solid #1E3A8A;
}
.tab-modern.active .tab-badge {
    background: #1E3A8A;
    color: white;
}
.tab-modern.active span {
    color: #1E3A8A;
}
/* Horizontal step line */
.step-line-horizontal {
    transition: all 0.3s ease;
}
    </style>
</head>

           <!-- Tabs modern tanpa bubble/frame -->

    <button class="tab-modern flex-1 pb-2 text-sm font-semibold text-slate-500 transition relative flex flex-col items-center justify-end h-12" data-tab="pending">

    <button class="tab-modern flex-1 pb-2 text-sm font-semibold text-slate-500 transition relative flex flex-col items-center justify-end h-12" data-tab="approved">

</div>

                        <i data-lucide="x-circle" class="w-4 h-4"></i> Tolak Terpilih
                    </button>
                </div>
            </div>
            
            <!-- List Container -->
            <div id="listContainer" class="space-y-3"></div>
        </div>
    </div>

    </div> 
</div>

    let currentTab = "pending";
    let currentFilter = { date: "", priority: "all" };
    let selectedItems = new Set();

    function getPriorityColor(priority) {
        switch(priority) {
            case 'urgent': return 'bg-red-100 text-red-700';
            case 'high': return 'bg-orange-100 text-orange-700';
            case 'medium': return 'bg-amber-100 text-amber-700';
            case 'low': return 'bg-emerald-100 text-emerald-700';
            default: return 'bg-slate-100 text-slate-700';
        }
    }

    function getPriorityText(priority) {
        switch(priority) {
            case 'urgent': return 'Urgent';
            case 'high': return 'High';
            case 'medium': return 'Medium';
            case 'low': return 'Low';
            default: return priority;
        }
    }

    function filterData() {
        let filtered = [...approvalData];
        if (currentFilter.date) {
            filtered = filtered.filter(item => item.tanggalPengajuan === currentFilter.date);
        }
        if (currentFilter.priority !== 'all') {
            filtered = filtered.filter(item => item.prioritas === currentFilter.priority);
        }
        const hasFilter = currentFilter.date !== '' || currentFilter.priority !== 'all';
        document.getElementById('filterBadge').style.display = hasFilter ? 'block' : 'none';
        return filtered;
    }

    function getDataByTab(tab) {
    // Kita filter langsung dari array utama agar datanya real-time ter-update
    switch(tab) {
        case 'pending': 
            return approvalData.filter(item => item.status === 'pending');
        case 'approved': 
            return approvalData.filter(item => item.status === 'approved');
        case 'rejected': 
            return approvalData.filter(item => item.status === 'rejected');
        default: 
            return [];
    }
}

    function updateTabCounts() {
    const counts = {
        pending: getDataByTab('pending').length,
        approved: getDataByTab('approved').length,
        rejected: getDataByTab('rejected').length
    };

    // Mapping ID element ke data
    const badges = {
        pending: document.getElementById('pendingTabCount'),
        approved: document.getElementById('approvedTabCount'),
        rejected: document.getElementById('rejectedTabCount')
    };

    Object.keys(badges).forEach(key => {
        const badge = badges[key];
        const count = counts[key];

        if (count > 0) {
            badge.innerText = count;
            badge.classList.remove('hidden'); // Tampilkan badge
        } else {
            badge.classList.add('hidden');    // Sembunyikan badge, layout akan otomatis merapat
        }
    });
}

            <p class="text-sm text-slate-400">Silakan coba filter tanggal lain</p>
        </div>
    `;
}
   function renderCard(item) {
    // Tentukan teks status approval yang benar
    let approvalStatusText = '';
    let approvalStatusColor = '';
    
    if (item.status === 'approved') {
        approvalStatusText = 'Disetujui';
        approvalStatusColor = 'text-emerald-600';
    } else if (item.status === 'rejected') {
        approvalStatusText = 'Ditolak';
        approvalStatusColor = 'text-red-600';
    } else {
        approvalStatusText = 'Menunggu';
        approvalStatusColor = 'text-slate-400';
    }
    
    // Tentukan tanggal approval yang ditampilkan
    let approvalDateText = '';
    if (item.tanggalApproval) {
        approvalDateText = item.tanggalApproval;
    } else if (item.status !== 'pending') {
        approvalDateText = '-';
    }
    
    return `
        <div class="card-item bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-100">
            <!-- Header card dengan warna sesuai status -->
            <div class="px-4 py-3 ${item.status === 'pending' ? 'bg-bpr-pending' : item.status === 'approved' ? 'bg-bpr-approved' : 'bg-bpr-rejected'}">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <i data-lucide="building-2" class="w-4 h-4 text-white"></i>
                        <span class="text-white font-bold text-sm">${item.judul}</span>
                    </div>
                    <span class="text-white text-[10px] font-bold px-2 py-0.5 rounded-full bg-white/20">${getPriorityText(item.prioritas)}</span>
                </div>
            </div>
            
            <div class="p-4">
                ${currentTab === 'pending' ? `
                    <div class="flex items-center gap-2 mb-3 pb-2 border-b border-slate-100" onclick="event.stopPropagation()">
                        <input type="checkbox" class="batch-checkbox w-4 h-4 rounded border-slate-300 text-bpr-primary" data-id="${item.id}" ${selectedItems.has(item.id) ? 'checked' : ''}>
                        <span class="text-xs text-slate-400 font-medium">Pilih untuk batch approval</span>
                    </div>
                ` : ''}
                
                <!-- No Approval -->
                <p class="text-xs text-slate-400 font-medium mb-2">No: ${item.noApproval}</p>
                
                <!-- Diajukan oleh -->
                <div class="flex items-center gap-2 mb-3">
                    <i data-lucide="user" class="w-3 h-3 text-slate-400"></i>
                    <span class="text-xs text-slate-500">Diajukan oleh <span class="font-semibold text-slate-700">${item.namaPengaju}</span> • ${item.posisiPengaju}</span>
                </div>
                
                <!-- Horizontal step approval -->
                <div class="flex items-center justify-between mt-3 pt-2 border-t border-slate-100">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <div class="step-dot bg-bpr-primary"></div>
                            <div class="step-line-horizontal flex-1 h-0.5 ${item.status !== 'pending' ? 'bg-bpr-primary' : 'bg-slate-200'}"></div>
                            <div class="step-dot ${item.status === 'pending' ? 'bg-slate-300' : item.status === 'approved' ? 'bg-bpr-approved' : 'bg-bpr-rejected'}"></div>
                        </div>
                        <div class="flex justify-between mt-1">
                            <span class="text-[10px] text-slate-400">Pengajuan</span>
                            <span class="text-[10px] text-slate-400">Approval</span>
                        </div>
                        <div class="flex justify-between mt-0.5">
                            <span class="text-[11px] font-medium text-slate-600">${item.tanggalPengajuan} • ${item.waktuPengajuan}</span>
                            <span class="text-[11px] font-medium ${approvalStatusColor}">${approvalStatusText}</span>
                        </div>
                        ${approvalDateText ? `
                                <div class="flex justify-end mt-0.5">
                                    <span class="text-[9px] text-slate-400">${approvalDateText}</span>
                                </div>
                            ` : ''}
                            <!-- Tombol Detail di pojok kanan bawah -->
                            <div class="flex justify-end mt-2 pt-2 border-t border-slate-100">
                                <button onclick="event.stopPropagation(); goToDetail(${item.id})" class="text-xs font-semibold text-bpr-primary flex items-center gap-1 px-3 py-1.5 rounded-lg bg-slate-50 active:bg-slate-100 transition">
                                    <i data-lucide="eye" class="w-3 h-3"></i> Lihat Detail
                                </button>
                            </div>
                       
                    </div>
                </div>
            </div>
        </div>
    `;
}

    function renderList() {
        resetSelectAllButton();
        const data = getDataByTab(currentTab);
        const container = document.getElementById('listContainer');
        
        if (data.length === 0) {
            container.innerHTML = renderEmptyState();
            lucide.createIcons();
            return;
        }
        
        container.innerHTML = data.map(item => renderCard(item)).join('');
        
        if (currentTab === 'pending') {
            document.querySelectorAll('.batch-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const id = parseInt(e.target.dataset.id);
                    if (e.target.checked) selectedItems.add(id);
                    else selectedItems.delete(id);
                    updateBatchMode();
                });
            });
        }
        
        lucide.createIcons();
    }

    function updateBatchMode() {
    const hasSelected = selectedItems.size > 0;
    document.getElementById('batchActions').style.display = hasSelected ? 'block' : 'none';
    document.getElementById('selectedCount').innerText = `${selectedItems.size} dipilih`;
}

// Fungsi Pilih Semua
function selectAllItems() {
    const pendingData = getDataByTab('pending');
    if (pendingData.length === 0) return;
    
    pendingData.forEach(item => {
        selectedItems.add(item.id);
    });
    updateBatchMode();
    renderList();
}

// Fungsi Unselect Semua
function unselectAllItems() {
    selectedItems.clear();
    updateBatchMode();
    renderList();
}

// Fungsi showConfirmPopup dengan gambar (Sudah Diperbaiki Logic Button-nya)
function showConfirmPopup(title, message, onConfirm, type = 'approve') {
    const popup = document.createElement('div');
    popup.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6';
    
    let imageSrc = '';
    if (type === 'approve') imageSrc = 'images/confirmed.png';
    else if (type === 'reject') imageSrc = 'images/reject.png';
    else if (type === 'error') imageSrc = 'images/server-error.png';
    
    popup.innerHTML = `
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 text-center" style="animation: slideUp 0.3s ease;">
            <img src="${imageSrc}" alt="${type}" class="w-48 h-48 mx-auto mb-4" onerror="this.src='https://placehold.co/80x80?text=❓'">
            <h3 class="text-lg font-bold text-slate-800 mb-2">${title}</h3>
            <p class="text-sm text-slate-500 mb-6">${message}</p>
            <div class="flex gap-3">
                <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-xl font-semibold">Batal</button>
                <button id="popupConfirmExecBtn" class="flex-1 ${type === 'approve' ? 'bg-bpr-approved' : 'bg-bpr-rejected'} text-white py-2.5 rounded-xl font-semibold shadow-md">Ya, ${type === 'approve' ? 'Setujui' : 'Tolak'}</button>
            </div>
        </div>
    `;
    document.body.appendChild(popup);

    // BINDING EVENT AMAN VIA JAVASCRIPT (Scope parameter onConfirm terjamin aman di sini)
    popup.querySelector('#popupConfirmExecBtn').onclick = () => {
        popup.remove(); // Hapus popup konfirmasi dari layar
        onConfirm();    // Jalankan fungsi executeBatchApprove / executeBatchReject
    };
}

// Show error popup khusus
function showErrorPopup(title, message) {
    const popup = document.createElement('div');
    popup.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6';
    
    popup.innerHTML = `
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 text-center" style="animation: slideUp 0.3s ease;">
            <img src="images/server-error.png" alt="error" class="w-20 h-20 mx-auto mb-4" onerror="this.src='https://placehold.co/80x80?text=⚠️'">
            <h3 class="text-lg font-bold text-red-600 mb-2">${title}</h3>
            <p class="text-sm text-slate-500 mb-6">${message}</p>
            <button onclick="this.closest('.fixed').remove()" class="w-full bg-slate-800 text-white py-2.5 rounded-xl font-semibold">Tutup</button>
        </div>
    `;
    document.body.appendChild(popup);
    
    // Auto close setelah 5 detik
    setTimeout(() => {
        if (popup && popup.remove) popup.remove();
    }, 5000);
}

    // Detail page functions
    function goToDetail(id) {
    // Redirect ke halaman terpisah
    window.location.href = `detail-approval1.html?id=${id}`;
}


        function batchApprove() {
    if (selectedItems.size === 0) {
        showToast('Tidak ada item yang dipilih');
        return;
    }
    
    const selectedIds = [...selectedItems];
    
    // Tampilkan popup konfirmasi approve massal dengan gambar
    showConfirmPopup(
        'Setujui Persetujuan',
        `Anda akan menyetujui ${selectedIds.length} pengajuan. Lanjutkan?`,
        () => {
            executeBatchApprove(selectedIds);
        },
        'approve'
    );
}

function batchReject() {
    if (selectedItems.size === 0) {
        showToast('Tidak ada item yang dipilih');
        return;
    }
    
    const selectedIds = [...selectedItems];
    
    showConfirmPopup(
        'Tolak Persetujuan',
        `Anda akan menolak ${selectedIds.length} pengajuan. Lanjutkan?`,
        () => {
            executeBatchReject(selectedIds);
        },
        'reject'
    );
}


function executeBatchApprove(selectedIds) {
    const successIds = [];
    const failedIds = []; // <--- Siapkan penampung data gagal
    
    selectedIds.forEach(id => {
        const item = approvalData.find(d => d.id === id);
        if (item && item.status === 'pending') {
            // Simulasi error 30% khusus jika memilih ALL DATA (10 data terpilih)
            const isError = selectedIds.length >= 10 ? (Math.random() < 0.3) : false;
            
            if (isError) {
                failedIds.push(id); // Masuk list gagal jika terkena internal server error
            } else {
                item.status = 'approved';
                item.approvalBy = "John Doe (Direksi)";
                item.tanggalApproval = new Date().toLocaleString('id-ID');
                item.komentar = "Disetujui massal";
                successIds.push(id);
            }
        }
    });
    
    successIds.forEach(id => selectedItems.delete(id));
    updateBatchMode();
    updateTabCounts();
    renderList();
    
    // Tampilkan popup error jika ada data yang gagal masuk database
    if (failedIds.length > 0) {
        showErrorPopup(
            'Internal Server Error',
            `${failedIds.length} dari ${selectedIds.length} pengajuan gagal disetujui.\n\nKode error: 500 - Database connection timeout.\nSilakan coba beberapa saat lagi.`
        );
    }
    
    if (successIds.length > 0) {
        showToast(`${successIds.length} pengajuan berhasil disetujui`);
    }
}

function executeBatchReject(selectedIds) {
    const successIds = [];
    const failedIds = []; // <--- Siapkan penampung data gagal
    
    selectedIds.forEach(id => {
        const item = approvalData.find(d => d.id === id);
        if (item && item.status === 'pending') {
            // Simulasi error 30% khusus jika memilih ALL DATA (10 data terpilih)
            const isError = selectedIds.length >= 10 ? (Math.random() < 0.3) : false;
            
            if (isError) {
                failedIds.push(id);
            } else {
                item.status = 'rejected';
                item.approvalBy = "John Doe (Direksi)";
                item.tanggalApproval = new Date().toLocaleString('id-ID');
                item.komentar = "Ditolak massal";
                successIds.push(id);
            }
        }
    });
    
    successIds.forEach(id => selectedItems.delete(id));
    updateBatchMode();
    updateTabCounts();
    renderList();
    
    // Tampilkan popup error jika ada data yang gagal masuk database
    if (failedIds.length > 0) {
        showErrorPopup(
            'Internal Server Error',
            `${failedIds.length} dari ${selectedIds.length} pengajuan gagal ditolak.\n\nKode error: 500 - Service unavailable.\nSilakan coba beberapa saat lagi.`
        );
    }
    
    if (successIds.length > 0) {
        showToast(`${successIds.length} pengajuan berhasil ditolak`);
    }
}

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 transform -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-lg bg-slate-800 text-white text-sm font-medium';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Event listeners
    document.getElementById('batchApproveBtn')?.addEventListener('click', batchApprove);
    document.getElementById('batchRejectBtn')?.addEventListener('click', batchReject);
    // Pilih Semua / Unselect All
document.getElementById('selectAllBtn')?.addEventListener('click', () => {
    const pendingData = getDataByTab('pending');
    if (selectedItems.size === pendingData.length && pendingData.length > 0) {
        unselectAllItems();
        document.getElementById('selectAllBtn').innerHTML = '<i data-lucide="check-square" class="w-3 h-3"></i> Pilih Semua';
    } else {
        selectAllItems();
        document.getElementById('selectAllBtn').innerHTML = '<i data-lucide="x-square" class="w-3 h-3"></i> Batal Pilih';
    }
    lucide.createIcons();
});


// Reset tombol select all ketika ganti tab
function resetSelectAllButton() {
    const selectBtn = document.getElementById('selectAllBtn');
    if (selectBtn) {
        selectBtn.innerHTML = '<i data-lucide="check-square" class="w-3 h-3"></i> Pilih Semua';
        lucide.createIcons();
    }
}

// Update fungsi renderList untuk panggil resetSelectAllButton
// Cari function renderList, tambahkan di awal:
// resetSelectAllButton();
    let filterOpen = false;
    document.getElementById('filterBtn')?.addEventListener('click', () => {
        const panel = document.getElementById('filterPanel');
        filterOpen = !filterOpen;
        panel.style.display = filterOpen ? 'block' : 'none';
    });
    
    document.getElementById('resetFilterBtn')?.addEventListener('click', () => {
        currentFilter.date = '';
        currentFilter.priority = 'all';
        document.getElementById('dateFilter').value = '';
        document.getElementById('priorityFilter').value = 'all';
        renderList();
        updateTabCounts();
        filterOpen = false;
        document.getElementById('filterPanel').style.display = 'none';
        showToast('Filter direset');
    });
    
    document.getElementById('dateFilter')?.addEventListener('change', (e) => {
        currentFilter.date = e.target.value;
        renderList();
        updateTabCounts();
    });
    
    document.getElementById('priorityFilter')?.addEventListener('change', (e) => {
        currentFilter.priority = e.target.value;
        renderList();
        updateTabCounts();
    });
    
    // Set default date to today
    // Set default date ke tanggal yang ada data (2026-06-14)
// SET DEFAULT FILTER KE TANGGAL YANG ADA DATANYA (2026-06-14)
currentFilter.date = '2026-06-14';
document.getElementById('dateFilter').value = '2026-06-14';
    
    // Tab switching
    document.querySelectorAll('.tab-modern').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-modern').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTab = btn.dataset.tab;
            selectedItems.clear();
            updateBatchMode();
            renderList();
        });
    });
    
    // Aktifkan tab pertama (Pending)
    const firstTab = document.querySelector('.tab-modern');
    if (firstTab) {
        firstTab.classList.add('active');
    }
    
    // Initial render
    renderList();
    updateTabCounts();
</script>
