<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-Approval BPR - Beranda</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bpr-yellow': '#FBBF24',
                        'bpr-dark': '#1F2937',
                        'bpr-gray': '#6B7280',
                        'bpr-lightgray': '#F3F4F6'
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .mobile-container {
            max-width: 428px;
            margin: 0 auto;
            background: #F9FAFB;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .notification-badge {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #EF4444;
            color: white;
            border-radius: 20px;
            min-width: 65px;
            height: 18px;
            font-size: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            padding: 0 5px;
            white-space: nowrap;
            font-family: monospace;
        }
        
        .status-card {
            transition: transform 0.1s ease;
        }
        
        .status-card:active {
            transform: scale(0.97);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification-dropdown {
            animation: slideIn 0.3s ease;
        }
        
        .menu-item {
            transition: all 0.1s ease;
        }
        
        .menu-item:active {
            transform: scale(0.94);
        }
        
        .bottom-nav-item {
            transition: color 0.1s ease;
        }
        
        .bottom-nav-item.active {
            color: #FBBF24;
        }
        
        /* Warna icon menu */
        .icon-rekening { color: #3B82F6; }
        .icon-data { color: #10B981; }
        .icon-pinjaman { color: #F59E0B; }
        .icon-default { color: #6B7280; }
        
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #F3F4F6;
        }
        ::-webkit-scrollbar-thumb {
            background: #FBBF24;
            border-radius: 10px;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slideUp {
            animation: slideUp 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-200 flex justify-center items-start font-sans">
    
<div class="mobile-container">
    <!-- Header Section -->
    <div class="bg-white sticky top-0 z-40">
        <div class="px-4 pt-4 pb-3">
            <div class="flex justify-between items-start">
                <div>
                    <p class="text-xs text-bpr-gray" id="greetingText">Selamat Pagi,</p>
                    <h2 class="text-lg font-bold text-bpr-dark" id="userName">John Doe</h2>
                    <div class="flex gap-3 mt-1">
                        <p class="text-[11px] text-bpr-gray" id="currentTime">--:--</p>
                        <p class="text-[11px] text-bpr-gray" id="currentDate">---</p>
                    </div>
                </div>
                <div class="relative">
                    <button id="notificationBell" class="relative p-2 rounded-full active:bg-gray-100 transition">
                        <i data-lucide="bell" class="w-5 h-5 text-bpr-dark"></i>
                        <span id="notificationCount" class="notification-badge" style="display: none; background-color: #EF4444; min-width: 18px; height: 18px; top: -5px; right: -5px;">0</span>
                    </button>
                    
                    <!-- Notification Dropdown -->
                    <div id="notificationDropdown" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-gray-100 hidden z-50 notification-dropdown" style="max-height: 400px; overflow-y: auto;">
                        <div class="p-3 border-b border-gray-100 font-semibold text-bpr-dark text-sm">Notifikasi</div>
                        <div id="notificationList" class="divide-y divide-gray-100"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="px-4 py-3 pb-24 overflow-y-auto" style="height: calc(100vh - 100px);">
        
        <!-- Filter Date (Pertama sebelum card dashboard) -->
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-bpr-dark">📅 Filter Tanggal</label>
                <div class="flex gap-2">
                    <input type="date" id="filterDate" class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-bpr-yellow">
                    <button id="applyFilter" class="bg-bpr-yellow text-black px-3 py-1.5 rounded-lg text-xs font-semibold active:scale-95 transition">Terapkan</button>
                </div>
            </div>
        </div>

        <!-- Stats Cards (2 kolom grid) -->
        <!-- Stats Cards - Desain Modern Tanpa Persentase -->
<div class="grid grid-cols-2 gap-3 mb-5">
    <!-- Card Pending -->
    <div class="status-card bg-gradient-to-br from-yellow-400 to-yellow-500 rounded-xl p-4 shadow-lg">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-xs text-white opacity-90">Pending</p>
                <p class="text-3xl font-bold text-white mt-1" id="pendingCount">0</p>
            </div>
            <div class="bg-white/20 rounded-full p-2 backdrop-blur">
                <i data-lucide="clock" class="w-6 h-6 text-white"></i>
            </div>
        </div>
        <p class="text-[10px] text-white/80 mt-2">Menunggu persetujuan</p>
    </div>

    <!-- Card Ditolak -->
    <div class="status-card bg-gradient-to-br from-red-400 to-red-500 rounded-xl p-4 shadow-lg">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-xs text-white opacity-90">Ditolak</p>
                <p class="text-3xl font-bold text-white mt-1" id="rejectedCount">0</p>
            </div>
            <div class="bg-white/20 rounded-full p-2 backdrop-blur">
                <i data-lucide="x-circle" class="w-6 h-6 text-white"></i>
            </div>
        </div>
        <p class="text-[10px] text-white/80 mt-2">Tidak disetujui</p>
    </div>

    <!-- Card Disetujui -->
    <div class="status-card bg-gradient-to-br from-green-400 to-green-500 rounded-xl p-4 shadow-lg">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-xs text-white opacity-90">Disetujui</p>
                <p class="text-3xl font-bold text-white mt-1" id="approvedCount">0</p>
            </div>
            <div class="bg-white/20 rounded-full p-2 backdrop-blur">
                <i data-lucide="check-circle" class="w-6 h-6 text-white"></i>
            </div>
        </div>
        <p class="text-[10px] text-white/80 mt-2">Sudah diproses</p>
    </div>

    <!-- Card Urgent (sejajar, bukan full width) -->
    <div class="status-card bg-gradient-to-br from-orange-500 to-red-500 rounded-xl p-4 shadow-lg relative overflow-hidden">
        <div class="absolute inset-0 bg-white/5"></div>
        <div class="flex justify-between items-start relative z-10">
            <div>
                <p class="text-xs text-white opacity-90 flex items-center gap-1">
                    <i data-lucide="alert-triangle" class="w-3 h-3"></i>
                    Urgent
                </p>
                <p class="text-3xl font-bold text-white mt-1" id="urgentCount">0</p>
            </div>
            <div class="bg-white/20 rounded-full p-2 backdrop-blur">
                <i data-lucide="alert-triangle" class="w-6 h-6 text-white"></i>
            </div>
        </div>
        <p class="text-[10px] text-white/80 mt-2 relative z-10">Butuh persetujuan segera</p>
    </div>
</div>

        <!-- Menu Section -->
        <div class="mb-4">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-sm font-bold text-bpr-dark">Menu Approval</h1>
                <button id="showAllMenuBtn" class="text-bpr-yellow text-xs font-semibold active:opacity-70">Lihat Semua →</button>
            </div>
            
            <!-- Menu Grid (8 menu) -->
            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </div>

    <!-- Bottom Navigation (Fixed) -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-lg" style="max-width: 428px; margin: 0 auto;">
        <div class="flex justify-around items-center py-2">
            <button class="bottom-nav-item active flex flex-col items-center gap-0.5" data-nav="home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px]">Beranda</span>
            </button>
            <button class="bottom-nav-item flex flex-col items-center gap-0.5" data-nav="notification">
                <div class="relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span id="bottomNotifBadge" class="notification-badge" style="display: none; background-color: #EF4444; min-width: 18px; height: 18px; top: -5px; right: -5px;">0</span>
                </div>
                <span class="text-[10px]">Notifikasi</span>
            </button>
            <button class="bottom-nav-item flex flex-col items-center gap-0.5" data-nav="profile">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-[10px]">Profil</span>
            </button>
        </div>
    </div>

    <!-- Modal Semua Menu -->
    <div id="allMenuModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-end justify-center" style="display: none;">
        <div class="bg-white rounded-t-3xl w-full max-w-[428px] max-h-[85vh] overflow-y-auto animate-slideUp">
            <div class="sticky top-0 bg-white p-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-bpr-dark">Semua Menu</h3>
                <button id="closeMenuModal" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div class="grid grid-cols-4 gap-4 p-4" id="allMenuList"></div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // ========== DATA SIMULASI ==========
  
let currentUser = {
    name: localStorage.getItem('userName') || "John Doe",
    username: localStorage.getItem('loggedInUser') || "john_doe"
};
    
    let statsData = { pending: 12, rejected: 3, approved: 28, urgent: 4 };
    
    let notifications = [
        { id: 1, title: "Pembukaan Rekening", message: "Nasabah Ahmad butuh persetujuan", time: "5 menit lalu", read: false, menu: "rekening" },
        { id: 2, title: "Perubahan Data", message: "Perubahan alamat Budi", time: "1 jam lalu", read: false, menu: "data_nasabah" },
        { id: 3, title: "Pembukaan Pinjaman", message: "Pinjaman Rp 50 Juta", time: "2 jam lalu", read: false, menu: "pinjaman" },
        { id: 4, title: "Approval A", message: "Menunggu persetujuan", time: "3 jam lalu", read: true, menu: "approval_a" },
        { id: 5, title: "URGENT!", message: "Butuh approval segera", time: "5 jam lalu", read: false, menu: "urgent" }
    ];
    
    const menus = [
        { id: 1, name: "Pembukaan Rekening", icon: "user-plus", pending: 2, urgent: 0, color: "text-blue-500" },
        { id: 2, name: "Perubahan Data", icon: "users", pending: 0, urgent: 0, color: "text-emerald-500" },
        { id: 3, name: "Pembukaan Pinjaman", icon: "credit-card", pending: 0, urgent: 0, color: "text-amber-500" },
        { id: 4, name: "Approval A", icon: "file-check", pending: 0, urgent: 0, color: "text-purple-500" },
        { id: 5, name: "Approval B", icon: "file-text", pending: 0, urgent: 0, color: "text-gray-500" },
        { id: 6, name: "Approval C", icon: "clipboard", pending: 0, urgent: 0, color: "text-rose-500" },
        { id: 7, name: "Approval D", icon: "check-square", pending: 0, urgent: 0, color: "text-indigo-500" },
        { id: 8, name: "Approval E", icon: "shield", pending: 0, urgent: 0, color: "text-cyan-500" },
        { id: 9, name: "Approval F", icon: "lock", pending: 0, urgent: 0, color: "text-slate-500" },
        { id: 10, name: "Approval G", icon: "key", pending: 0, urgent: 0, color: "text-yellow-600" },
        { id: 11, name: "Approval H", icon: "mail", pending: 0, urgent: 0, color: "text-sky-500" },
        { id: 12, name: "Approval I", icon: "message-circle", pending: 0, urgent: 0, color: "text-lime-500" },
        { id: 13, name: "Approval J", icon: "phone", pending: 0, urgent: 0, color: "text-teal-500" },
        { id: 14, name: "Approval K", icon: "video", pending: 0, urgent: 0, color: "text-violet-500" },
        { id: 15, name: "Approval L", icon: "camera", pending: 0, urgent: 0, color: "text-fuchsia-500" },
        { id: 16, name: "Approval M", icon: "image", pending: 0, urgent: 0, color: "text-pink-500" },
        { id: 17, name: "Approval N", icon: "map-pin", pending: 0, urgent: 0, color: "text-red-500" },
        { id: 18, name: "Approval O", icon: "compass", pending: 0, urgent: 0, color: "text-orange-500" },
        { id: 19, name: "Approval P", icon: "globe", pending: 0, urgent: 0, color: "text-emerald-600" },
        { id: 20, name: "Approval Q", icon: "cloud", pending: 0, urgent: 0, color: "text-blue-400" }
    ];
    
    function renderMenuGrid() {
        const menuGrid = document.getElementById('menuGrid');
        const visibleMenus = menus.slice(0, 8);
        
        menuGrid.innerHTML = visibleMenus.map(menu => {
            const totalPending = menu.pending + menu.urgent;
            // Merapikan format bubble: Tampilkan angkanya saja (misal: 3) agar tidak merusak layout grid mobile
            const badgeText = `${totalPending}`; 
            
            return `
            <div class="menu-item flex flex-col items-center gap-1.5 cursor-pointer" data-menu="${menu.id}">
                <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                    <i data-lucide="${menu.icon}" class="w-5 h-5 text-orange-500 stroke-[2.5]"></i>
                    
                    ${totalPending > 0 ? `
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-sm ring-2 ring-white">
                            ${badgeText}
                        </span>` : ''}
                </div>
                <span class="text-[10px] text-center text-bpr-dark font-semibold leading-tight px-1">${menu.name}</span>
            </div>
        `}).join('');
        
        lucide.createIcons();
        
        document.querySelectorAll('[data-menu]').forEach(el => {
            el.addEventListener('click', () => {
                const menuId = parseInt(el.dataset.menu);
                const menu = menus.find(m => m.id === menuId);
                
                if (menu.name === "Pembukaan Rekening") {
                    window.location.href = "pembukaan-rekening.html";
                } else {
                    alert(`Menu ${menu?.name}\nPending: ${menu?.pending}\nUrgent: ${menu?.urgent}\nFitur akan segera hadir`);
                }
            });
        });
    }
    
    function renderAllMenuModal() {
        const allMenuList = document.getElementById('allMenuList');
        allMenuList.innerHTML = menus.map(menu => {
            const totalPending = menu.pending + menu.urgent;
            const badgeText = `${totalPending}`;
            return `
            <div class="menu-item flex flex-col items-center gap-1.5 cursor-pointer" data-menu-all="${menu.id}">
                <div class="relative w-11 h-11 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200">
                    <i data-lucide="${menu.icon}" class="w-5 h-5 text-orange-500 stroke-[2.5]"></i>
                    ${totalPending > 0 ? `
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center shadow-sm ring-2 ring-white">
                            ${badgeText}
                        </span>` : ''}
                </div>
                <span class="text-[9px] text-center text-bpr-dark font-medium leading-tight">${menu.name}</span>
            </div>
        `}).join('');
        lucide.createIcons();
        
        document.querySelectorAll('[data-menu-all]').forEach(el => {
            el.addEventListener('click', () => {
                const menuId = parseInt(el.dataset.menuAll);
                const menu = menus.find(m => m.id === menuId);
                
                if (menu.name === "Pembukaan Rekening") {
                    window.location.href = "pembukaan-rekening.html";
                } else {
                    alert(`Menu ${menu?.name}\nPending: ${menu?.pending}\nUrgent: ${menu?.urgent}`);
                    document.getElementById('allMenuModal').style.display = 'none';
                }
            });
        });
    }
    
    function updateStatistics() {
    document.getElementById('pendingCount').innerText = statsData.pending;
    document.getElementById('rejectedCount').innerText = statsData.rejected;
    document.getElementById('approvedCount').innerText = statsData.approved;
    document.getElementById('urgentCount').innerText = statsData.urgent;
}
    
    function updateGreetingAndTime() {
        const now = new Date();
        const hours = now.getHours();
        let greeting = hours >= 5 && hours < 12 ? 'Selamat Pagi' : (hours >= 12 && hours < 15 ? 'Selamat Siang' : (hours >= 15 && hours < 18 ? 'Selamat Sore' : 'Selamat Malam'));
        document.getElementById('greetingText').innerHTML = `${greeting},`;
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    
    function updateNotificationBell() {
        const unreadCount = notifications.filter(n => !n.read).length;
        const bellBadge = document.getElementById('notificationCount');
        const bottomBadge = document.getElementById('bottomNotifBadge');
        if (unreadCount > 0) {
            bellBadge.style.display = 'flex';
            bellBadge.innerText = unreadCount;
            bottomBadge.style.display = 'flex';
            bottomBadge.innerText = unreadCount;
        } else {
            bellBadge.style.display = 'none';
            bottomBadge.style.display = 'none';
        }
        
        const notificationList = document.getElementById('notificationList');
        notificationList.innerHTML = notifications.map(notif => `
            <div class="p-3 hover:bg-gray-50 cursor-pointer ${!notif.read ? 'bg-yellow-50' : ''}" data-notif-id="${notif.id}">
                <div class="flex gap-2">
                    <i data-lucide="bell" class="w-4 h-4 text-bpr-yellow"></i>
                    <div class="flex-1">
                        <p class="text-sm font-semibold text-bpr-dark">${notif.title}</p>
                        <p class="text-xs text-bpr-gray">${notif.message}</p>
                        <p class="text-[10px] text-bpr-gray mt-1">${notif.time}</p>
                    </div>
                    ${!notif.read ? '<div class="w-2 h-2 bg-yellow-400 rounded-full"></div>' : ''}
                </div>
            </div>
        `).join('');
        lucide.createIcons();
        
        document.querySelectorAll('[data-notif-id]').forEach(el => {
            el.addEventListener('click', () => {
                const id = parseInt(el.dataset.notifId);
                const notif = notifications.find(n => n.id === id);
                if (notif) { notif.read = true; updateNotificationBell(); alert(`${notif.title}\n${notif.message}`); }
            });
        });
    }
    
    // Event Listeners
    let isNotificationOpen = false;
    document.getElementById('notificationBell').addEventListener('click', (e) => {
        e.stopPropagation();
        const dropdown = document.getElementById('notificationDropdown');
        isNotificationOpen = !isNotificationOpen;
        dropdown.style.display = isNotificationOpen ? 'block' : 'none';
    });
    
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('notificationDropdown');
        const bell = document.getElementById('notificationBell');
        if (!bell?.contains(e.target) && dropdown?.style.display === 'block') {
            dropdown.style.display = 'none';
            isNotificationOpen = false;
        }
    });
    
    document.getElementById('showAllMenuBtn')?.addEventListener('click', () => {
        renderAllMenuModal();
        document.getElementById('allMenuModal').style.display = 'flex';
    });
    document.getElementById('closeMenuModal')?.addEventListener('click', () => {
        document.getElementById('allMenuModal').style.display = 'none';
    });
    
    document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const nav = e.currentTarget.dataset.nav;
            if (nav === 'home') alert('Anda di Beranda');
            else if (nav === 'notification') document.getElementById('notificationBell').click();
            else if (nav === 'profile') alert(`👤 ${currentUser.name}\nFitur profil segera hadir`);
            document.querySelectorAll('[data-nav]').forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
        });
    });
    
    document.getElementById('applyFilter')?.addEventListener('click', () => {
        const filterDate = document.getElementById('filterDate').value;
        if (filterDate) {
            statsData = { pending: Math.floor(Math.random()*20), rejected: Math.floor(Math.random()*8), approved: Math.floor(Math.random()*30), urgent: Math.floor(Math.random()*6) };
            updateStatistics();
            alert(`📅 Data untuk: ${filterDate}`);
        } else alert('Pilih tanggal!');
    });
    
    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
    
    setInterval(updateGreetingAndTime, 1000);
    updateGreetingAndTime();
    updateStatistics();
    renderMenuGrid();
    updateNotificationBell();
</script>
</body>
</html>
