<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-Approval BPR - Beranda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bpr-yellow': '#FBBF24',
                        'bpr-dark': '#1F2937',
                        'bpr-gray': '#6B7280',
                        'bpr-lightgray': '#F3F4F6'
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .mobile-container {
    max-width: 428px;
    margin: 0 auto;
    background: #F9FAFB;
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    overflow-x: hidden; /* <-- Tambahkan baris ini */
}
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #EF4444;
            color: white;
            border-radius: 9999px;
            min-width: 22px;
            height: 22px;
            font-size: 11px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 7px;
            border: 2.5px solid white;
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.5);
            line-height: 1;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        .notification-badge-footer {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            background-color: #EF4444;
            border-radius: 9999px;
            border: 2.5px solid white;
            box-shadow: 0 1px 6px rgba(239, 68, 68, 0.4);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        
        .status-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .status-card:active {
            transform: scale(0.97);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .notification-dropdown {
            animation: slideIn 0.3s ease;
        }
        
        .menu-item {
            transition: all 0.1s ease;
        }
        
        .menu-item:active {
            transform: scale(0.94);
        }
        
        .bottom-nav-item {
            transition: color 0.1s ease;
        }
        
        .bottom-nav-item.active {
            color: #FBBF24;
        }
        
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #F3F4F6;
        }
        ::-webkit-scrollbar-thumb {
            background: #FBBF24;
            border-radius: 10px;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slideUp {
            animation: slideUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap');
    </style>
</head>
<body class="bg-gray-200 flex justify-center items-start font-sans">
    
<div class="mobile-container flex flex-col h-screen overflow-hidden">
    <div class="bg-white sticky top-0 z-40 shadow-sm shrink-0">
        <div class="px-4 pt-4 pb-3">
    <div class="flex justify-between items-center"> <div class="flex items-center gap-3">
            <div class="w-18 h-11 rounded-xl bg-white flex items-center justify-center shadow-sm shrink-0 overflow-hidden">
                <img src="images/m_approval.png" alt="Logo M-Approval" class="w-full h-full object-contain p-1.5">
            </div>
            
            <div class="min-w-0">
                <p class="text-[11px] text-bpr-gray leading-tight" id="greetingText">Selamat Pagi,</p>
                <h2 class="text-base font-bold text-bpr-dark truncate" id="userName">John Doe</h2>
                <div class="flex gap-2 mt-0.5">
                    <p class="text-[10px] text-bpr-gray/80" id="currentTime">--:--</p>
                    <p class="text-[10px] text-bpr-gray/80" id="currentDate">---</p>
                </div>
            </div>
        </div>
        
        <div class="relative shrink-0">
            <button id="notificationBell" class="relative p-2 rounded-full active:bg-gray-100 transition">
                <i data-lucide="bell" class="w-5 h-5 text-bpr-dark"></i>
                <span id="notificationCount" class="notification-badge" style="display: none;">0</span>
            </button>
            
            <div id="notificationDropdown" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-gray-100 hidden z-50 notification-dropdown" style="max-height: 400px; overflow-y: auto;">
                <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
                    <span onclick="window.location.href='list-notif.html'" class="font-bold text-bpr-dark text-xs uppercase tracking-wider cursor-pointer hover:text-bpr-yellow transition">Notifikasi</span>
                    <button id="markAllReadBtn" class="text-[11px] text-amber-600 font-semibold hover:underline active:opacity-70">Tandai dibaca</button>
                </div>
                <div id="notificationList" class="divide-y divide-gray-100"></div>
            </div>
        </div>

    </div>
</div>
    </div>

    <div class="px-4 py-3 pb-24 overflow-y-auto flex-1 bg-[#F8FAFC]">
        
        <div class="bg-white rounded-xl p-3 shadow-sm mb-4 border border-gray-100">
            <div class="flex justify-between items-center">
                <label class="text-sm font-semibold text-bpr-dark">📅 Filter Tanggal</label>
                <div class="flex gap-2">
                    <input type="date" id="filterDate" class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-bpr-yellow">
                    <button id="applyFilter" class="bg-bpr-yellow text-black px-3 py-1.5 rounded-lg text-xs font-semibold active:scale-95 transition">Terapkan</button>
                </div>
            </div>
        </div>

       <div class="grid grid-cols-3 gap-1.5 mb-5 w-full min-w-0">
            <div class="status-card bg-gradient-to-br from-amber-400 via-amber-500 to-yellow-600 rounded-xl p-2 flex flex-col justify-between relative overflow-hidden shadow-sm">
                <div class="flex justify-between items-start gap-0.5">
                    <div class="min-w-0 flex-1">
                        <p class="text-[9px] text-white/80 font-bold uppercase tracking-wide truncate">Pending</p>
                        <p class="text-xl font-black text-white mt-0.5 tracking-tight" id="pendingCount">12</p>
                    </div>
                    <div class="bg-white/20 rounded-lg p-1 shrink-0">
                        <i data-lucide="clock" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                </div>
                <p class="text-[8px] text-white/90 font-medium mt-2 truncate leading-tight">Menunggu berkas</p>
            </div>

            <div class="status-card bg-gradient-to-br from-emerald-400 via-green-500 to-teal-600 rounded-xl p-2 flex flex-col justify-between relative overflow-hidden shadow-sm">
                <div class="flex justify-between items-start gap-0.5">
                    <div class="min-w-0 flex-1">
                        <p class="text-[9px] text-white/80 font-bold uppercase tracking-wide truncate">Disetujui</p>
                        <p class="text-xl font-black text-white mt-0.5 tracking-tight" id="approvedCount">28</p>
                    </div>
                    <div class="bg-white/20 rounded-lg p-1 shrink-0">
                        <i data-lucide="check-circle" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                </div>
                <p class="text-[8px] text-white/90 font-medium mt-2 truncate leading-tight">Sudah diproses</p>
            </div>

            <div class="status-card bg-gradient-to-br from-rose-400 via-red-500 to-pink-600 rounded-xl p-2 flex flex-col justify-between relative overflow-hidden shadow-sm">
                <div class="flex justify-between items-start gap-0.5">
                    <div class="min-w-0 flex-1">
                        <p class="text-[9px] text-white/80 font-bold uppercase tracking-wide truncate">Ditolak</p>
                        <p class="text-xl font-black text-white mt-0.5 tracking-tight" id="rejectedCount">3</p>
                    </div>
                    <div class="bg-white/20 rounded-lg p-1 shrink-0">
                        <i data-lucide="x-circle" class="w-3.5 h-3.5 text-white"></i>
                    </div>
                </div>
                <p class="text-[8px] text-white/90 font-medium mt-2 truncate leading-tight">Tidak disetujui</p>
            </div>
        </div>

        <div class="mb-4">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-sm font-bold text-bpr-dark tracking-tight">Menu Approval</h1>
                <button id="showAllMenuBtn" class="text-amber-500 text-xs font-bold active:opacity-70">Lihat Semua →</button>
            </div>
            <div class="menu-grid bg-slate-50 border border-gray-100 rounded-2xl p-3" id="menuGrid"></div>
        </div>
    </div>

    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 shadow-lg z-40 shrink-0">
        <div class="flex justify-around items-center py-2">
            <button class="bottom-nav-item active flex flex-col items-center gap-0.5" data-nav="home">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px]">Beranda</span>
            </button>
            <button id="bottomNotificationBtn" class="bottom-nav-item flex flex-col items-center gap-0.5" data-nav="notification">
                <div class="relative">
                    <i data-lucide="mail" class="w-5 h-5"></i>
                    <span id="bottomNotifBadge" class="notification-badge-footer" style="display: none;"></span>
                </div>
                <span class="text-[10px]">Notifikasi</span>
            </button>
            <button class="bottom-nav-item flex flex-col items-center gap-0.5" data-nav="profile">
                <i data-lucide="user" class="w-5 h-5"></i>
                <span class="text-[10px]">Profil</span>
            </button>
        </div>
    </div>

    <div id="allMenuModal" class="fixed inset-0 bg-black/60 z-50 hidden items-end justify-center" style="display: none;">
        <div class="bg-white rounded-t-3xl w-full max-w-[428px] flex flex-col animate-slideUp overflow-hidden">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white shrink-0">
                <h3 class="text-base font-bold text-bpr-dark">Semua Menu Approval</h3>
                <button id="closeMenuModal" class="text-gray-400 text-2xl p-1 focus:outline-none">&times;</button>
            </div>
            <div class="grid grid-cols-4 gap-4 p-4 overflow-y-auto max-h-[60vh] bg-slate-50 shadow-inner" id="allMenuList"></div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // ========== DATA SIMULASI ==========
    let currentUser = {
        name: localStorage.getItem('userName') || "John Doe",
        username: localStorage.getItem('loggedInUser') || "john_doe"
    };
    
    let statsData = { pending: 12, rejected: 3, approved: 28, urgent: 4 };
    
    let notifications = [
        { id: 1, title: "Transaksi Umum", message: "Nasabah Ahmad butuh persetujuan", time: "5 menit lalu", read: false, menu: "rekening" },
        { id: 2, title: "Transaksi Antar GL", message: "Perubahan alamat Budi", time: "1 jam lalu", read: false, menu: "Transaksi Antar GL" },
        { id: 3, title: "Pembukaan Rek Deposito", message: "Deposito Rp 10 Juta", time: "2 jam lalu", read: false, menu: "Pembukaan Rek Deposito" },
        { id: 4, title: "Pembukaan Rek Pinjaman", message: "Pinjaman Rp 50 Juta", time: "3 jam lalu", read: true, menu: "Pembukaan Rek Pinjaman" },
        { id: 5, title: "Pembukaan Rek Tabungan", message: "Butuh approval segera", time: "5 jam lalu", read: false, menu: "Pembukaan Rek Tabungan" }
    ];
    
    const menus = [
        { id: 1, name: "Administrasi Pemakai ARB+", icon: "user-cog", pending: 1, urgent: 0 },
        { id: 2, name: "Transaksi Umum", icon: "arrow-left-right", pending: 5, urgent: 0 },
        { id: 3, name: "Transaksi Antar GL", icon: "book-open", pending: 10, urgent: 0 },
        { id: 4, name: "Pembukaan Rek Deposito", icon: "piggy-bank", pending: 1, urgent: 0 },
        { id: 5, name: "Pembukaan Rek Pinjaman", icon: "hand-coins", pending: 1, urgent: 0 },
        { id: 6, name: "Pembukaan Rek Tabungan", icon: "wallet", pending: 1, urgent: 0 },
        { id: 7, name: "Pencairan/Break Bilyet Deposito", icon: "gavel", pending: 1, urgent: 0 },
        { id: 8, name: "Penutupan Rekening Pinjaman", icon: "folder-closed", pending: 1, urgent: 0 },
        { id: 9, name: "Penutupan Rekening Tabungan", icon: "folder-x", pending: 1, urgent: 0 },
        { id: 10, name: "Pinjaman Adendum", icon: "file-plus-2", pending: 1, urgent: 0 },
        { id: 11, name: "Kolektabilitas Manual Pinjaman", icon: "activity", pending: 1, urgent: 0 },
        { id: 12, name: "Suku Bunga Khusus Tabungan", icon: "percent", pending: 1, urgent: 0 },
        { id: 13, name: "Blokir Bilyet Deposito", icon: "shield-alert", pending: 1, urgent: 0 },
        { id: 14, name: "Blokir Rekening Tabungan", icon: "ban", pending: 1, urgent: 0 },
        { id: 15, name: "Blokir Dana Tabungan", icon: "lock", pending: 1, urgent: 0 },
        { id: 16, name: "Pembatalan Blokir Rek.Tabungan", icon: "unlock", pending: 1, urgent: 0 },
        { id: 17, name: "Pembatalan Blokir Dana Tabungan", icon: "shield-check", pending: 1, urgent: 0 },
        { id: 18, name: "Transaksi Setoran Tabungan Instansi", icon: "building-2", pending: 1, urgent: 0 },
        { id: 19, name: "Transaksi Setoran Pinjaman Instansi", icon: "landmark", pending: 0, urgent: 0 },
        { id: 20, name: "Transaksi Slisih Kas Teller", icon: "scale", pending: 0, urgent: 0 },
        { id: 21, name: "Hapus Buku Pinjaman", icon: "file-minus-2", pending: 0, urgent: 0 },
        { id: 22, name: "Restrukturisasi Pinjaman", icon: "refresh-cw", pending: 1, urgent: 0 },
        { id: 23, name: "Batal Restrukturisasi Pinjaman", icon: "rotate-ccw", pending: 1, urgent: 0 },
        { id: 24, name: "Batal Adendum Pinjaman", icon: "file-x-2", pending: 0, urgent: 0 },
        { id: 25, name: "Pemeliharaan Finansial", icon: "wrench", pending: 1, urgent: 0 },
        { id: 26, name: "Pembatalan Blokir Bilyet Deposito", icon: "key-round", pending: 1, urgent: 0 }
    ];
        
    function setupHomeMenuEvents() {
        document.querySelectorAll('[data-menu], [data-menu-all]').forEach(el => {
            el.addEventListener('click', () => {
                const menuId = parseInt(el.dataset.menu || el.dataset.menuAll);
                const menu = menus.find(m => m.id === menuId);
                
               const menuMap = {
                "Administrasi Pemakai ARB+": "pengguna-arb.html",
                "Transaksi Umum": "pembukaan-rekening.html",
                "Transaksi Antar GL": "transaksi-antar-gl.html",
                "Pembukaan Rek Deposito": "pembukaan-rek-deposito.html",
                "Pembukaan Rek Pinjaman": "pembukaan-rek-pinjaman.html",
                "Pembukaan Rek Tabungan": "pembukaan-rek-tabungan.html",
                "Pencairan/Break Bilyet Deposito": "pencairan-bilyet-deposito.html",
                "Penutupan Rekening Pinjaman": "penutupan-rek-pinjaman.html",
                "Pinjaman Adendum": "adendum-pinjaman.html",
                "Kolektabilitas Manual Pinjaman": "kolekt-manual-pinjaman.html",
                "Suku Bunga Khusus Tabungan": "suku-bunga-khusus-tab.html",
                "Blokir Bilyet Deposito": "blokir-bilyet-deposito.html",
                "Blokir Rekening Tabungan": "blokir-rek-tab.html",
                "Blokir Dana Tabungan": "blokir-rek-dana-tab.html",
                "Pembatalan Blokir Rek.Tabungan": "batal-blok-rek-tab.html",
                "Pembatalan Blokir Dana Tabungan": "batal-blok-dana-tab.html",
                "Transaksi Setoran Tabungan Instansi": "trans-setor-tab-instans.html",
                "Transaksi Setoran Pinjaman Instansi": "trans-setor-pinj-instans.html", 
                "Transaksi Slisih Kas Teller": "trans-selisih-kas.html",
                "Hapus Buku Pinjaman": "hapus-buk-pinj.html",
                "Restrukturisasi Pinjaman": "rest-pinj.html",
                "Batal Restrukturisasi Pinjaman": "batal-rest-pinj.html",
                "Batal Adendum Pinjaman": "batal-adendum-pinj.html",
                "Pemeliharaan Finansial": "pemeliharaan-finansial.html",
                "Pembatalan Blokir Bilyet Deposito": "batal-blok-bilyet-depo.html"
                
            };
                
                const targetPage = menuMap[menu?.name];
                if (targetPage) {
                    window.location.href = targetPage;
                } else {
                    alert(`Menu ${menu?.name}\nPending: ${menu?.pending}\nFitur akan segera hadir`);
                }
            });
        });
    }

    // ========== RENDER MENU GRID UTAMA (Desain Elegan Putih-Abu) ==========
    function renderMenuGrid() {
    const menuGrid = document.getElementById('menuGrid');
    const visibleMenus = menus.slice(0, 12);
    
    menuGrid.innerHTML = visibleMenus.map(menu => {
        const totalPending = menu.pending + menu.urgent;
        return `
        <div class="menu-item flex flex-col items-center justify-center text-center gap-1.5 cursor-pointer w-full min-w-0" data-menu="${menu.id}">
            <div class="relative w-11 h-11 rounded-full bg-white flex items-center justify-center border border-slate-200 shadow-sm flex-shrink-0">
                <i data-lucide="${menu.icon}" class="w-5 h-5 text-orange-500 stroke-[2.5]"></i>
                ${totalPending > 0 ? `
                <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-sm ring-2 ring-white leading-none">
                    ${totalPending}
                </span>` : ''}
            </div>
        <span class="text-[9px] text-center text-bpr-dark font-semibold leading-tight break-words w-full px-0.5">${menu.name}</span>
</span>
        </div>
    `}).join('');
    
    lucide.createIcons();
    setupHomeMenuEvents();
}

    // ========== RENDER ALL MENU MODAL ==========
    function renderAllMenuModal() {
        const allMenuList = document.getElementById('allMenuList');
        allMenuList.innerHTML = menus.map(menu => {
            const totalPending = menu.pending + menu.urgent;
            return `
            <div class="menu-item flex flex-col items-center justify-center text-center gap-1.5 cursor-pointer py-1 w-full" data-menu-all="${menu.id}">
                <div class="relative w-11 h-11 rounded-full bg-white flex items-center justify-center border border-slate-200 shadow-sm flex-shrink-0">
                    <i data-lucide="${menu.icon}" class="w-5 h-5 text-orange-500 stroke-[2.5]"></i>
                    ${totalPending > 0 ? `
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center shadow-sm ring-2 ring-white leading-none">
                        ${totalPending}
                    </span>` : ''}
                </div>
                <span class="text-[9px] text-center text-bpr-dark font-semibold leading-tight break-words w-full px-0.5">${menu.name}</span>
            </div>
        `
        }).join('');
        lucide.createIcons();
        setupHomeMenuEvents();
    }

    function updateStatistics() {
        document.getElementById('pendingCount').innerText = statsData.pending;
        document.getElementById('rejectedCount').innerText = statsData.rejected;
        document.getElementById('approvedCount').innerText = statsData.approved;
    }
    
    function updateGreetingAndTime() {
        const now = new Date();
        const hours = now.getHours();
        let greeting = hours >= 5 && hours < 12 ? 'Selamat Pagi' : (hours >= 12 && hours < 15 ? 'Selamat Siang' : (hours >= 15 && hours < 18 ? 'Selamat Sore' : 'Selamat Malam'));
        document.getElementById('greetingText').innerHTML = `${greeting},`;
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('currentDate').innerText = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    
    function updateNotificationBell() {
        const unreadCount = notifications.filter(n => !n.read).length;
        const bellBadge = document.getElementById('notificationCount');
        const bottomBadge = document.getElementById('bottomNotifBadge');
        const notificationList = document.getElementById('notificationList');
        
        if (unreadCount > 0) {
            bellBadge.style.display = 'flex';
            bellBadge.innerText = unreadCount;
            bottomBadge.style.display = 'flex';
        } else {
            bellBadge.style.display = 'none';
            bottomBadge.style.display = 'none';
        }
        
        if (notificationList && notifications.length > 0) {
            let html = '';
            notifications.forEach(notif => {
                html += `
                    <div class="p-3 hover:bg-gray-50 cursor-pointer ${!notif.read ? 'bg-amber-50/50' : ''}" data-notif-id="${notif.id}">
                        <div class="flex gap-2">
                            <i data-lucide="bell" class="w-4 h-4 text-amber-500 shrink-0 mt-0.5"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-xs font-bold text-slate-800">${notif.title}</p>
                                <p class="text-[11px] text-slate-500 truncate mt-0.5">${notif.message}</p>
                                <p class="text-[9px] text-slate-400 mt-1">${notif.time}</p>
                            </div>
                            ${!notif.read ? '<div class="w-2 h-2 bg-amber-400 rounded-full shrink-0 mt-1.5"></div>' : ''}
                        </div>
                    </div>
                `;
            });
            notificationList.innerHTML = html;
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }
    }
    
    let isNotificationOpen = false;
    document.getElementById('notificationBell').addEventListener('click', (e) => {
        e.stopPropagation();
        updateNotificationBell();
        const dropdown = document.getElementById('notificationDropdown');
        isNotificationOpen = !isNotificationOpen;
        dropdown.style.display = isNotificationOpen ? 'block' : 'none';
    });
    
    document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('notificationDropdown');
        const bell = document.getElementById('notificationBell');
        if (!bell?.contains(e.target) && dropdown?.style.display === 'block') {
            dropdown.style.display = 'none';
            isNotificationOpen = false;
        }
    });
    
    document.getElementById('showAllMenuBtn')?.addEventListener('click', () => {
        renderAllMenuModal();
        document.getElementById('allMenuModal').style.display = 'flex';
    });
    document.getElementById('closeMenuModal')?.addEventListener('click', () => {
        document.getElementById('allMenuModal').style.display = 'none';
    });
    
    document.querySelectorAll('[data-nav]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const nav = e.currentTarget.dataset.nav;
            if (nav === 'home') return;
            else if (nav === 'notification') document.getElementById('notificationBell').click();
            else if (nav === 'profile') alert(`👤 John Doe\nFitur profil segera hadir`);
        });
    });

    document.getElementById('bottomNotificationBtn')?.addEventListener('click', () => {
        window.location.href = 'list-notif.html';
    });
    
    function markAllNotificationsAsRead() {
        notifications.forEach(notif => { notif.read = true; });
        updateNotificationBell();
    }

    document.getElementById('markAllReadBtn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        markAllNotificationsAsRead();
    });

    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
    setInterval(updateGreetingAndTime, 1000);
    updateGreetingAndTime();
    updateStatistics();
    renderMenuGrid();
    updateNotificationBell();
</script>
</body>
</html>
