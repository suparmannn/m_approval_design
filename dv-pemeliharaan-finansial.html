<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-Approval - Detail Transaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bpr-primary': '#1E3A8A',
                        'bpr-dark': '#0F172A',
                        'bpr-gray': '#64748B',
                        'bpr-approved': '#10B981',
                        'bpr-rejected': '#EF4444',
                    },
                    fontFamily: {
                        sans: [
                            '-apple-system', 
                            'BlinkMacSystemFont', 
                            '"Segoe UI"', 
                            'Roboto', 
                            'Helvetica', 
                            'Arial', 
                            'sans-serif'
                        ],
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .mobile-container { max-width: 428px; margin: 0 auto; background: #F8FAFC; min-height: 100vh; position: relative; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-animate { animation: slideUp 0.3s ease; }
        .modal-backdrop { animation: fadeIn 0.2s ease; }
        .btn-action { transition: all 0.15s ease; }
        .btn-action:active { transform: scale(0.95); }
        
        .card-title {
            font-size: 13px;
            font-weight: 800;
            color: #0F172A;
            padding-bottom: 6px;
            margin-bottom: 14px;
            border-bottom: 2px solid #0F172A;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        
        .detail-label {
            font-size: 12px;
            color: #0F172A;
            font-weight: 700;
        }
        
        .detail-value {
            font-size: 12px;
            color: #64748B;
            font-weight: 500;
            word-break: break-word;
        }
        .detail-value.empty {
            color: #CBD5E1;
            font-weight: 400;
        }
        
        .status-badge-detail {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #FEF3C7; color: #D97706; }
        .status-approved { background: #D1FAE5; color: #059669; }
        .status-rejected { background: #FEE2E2; color: #DC2626; }
        
        .header-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .dot-pending { background: #F97316; }
        .dot-approved { background: #10B981; }
        .dot-rejected { background: #EF4444; }
        
        .section-divider {
            border: none;
            border-top: 2px solid #E2E8F0;
            margin: 0 0 14px 0;
        }

        .badge-dk {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-debet { background: #E0F2FE; color: #0369A1; border: 1px solid #BAE6FD; }
        .badge-kredit { background: #FEF3C7; color: #B45309; border: 1px solid #FDE68A; }
    </style>
</head>
<body class="bg-gray-200 font-sans">

<div class="mobile-container">
    <div class="bg-white px-5 pt-5 pb-4 sticky top-0 z-40 shadow-sm">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-2 active:bg-gray-100 rounded-xl transition">
                <i data-lucide="arrow-left" class="w-5 h-5 text-bpr-dark"></i>
            </button>
            <div class="flex-1">
                <h1 class="text-xl font-bold text-bpr-dark tracking-tight">Detail Transaksi</h1>
                <p class="text-xs text-bpr-gray mt-0.5" id="statusLabel">Informasi lengkap transaksi</p>
            </div>
        </div>
    </div>

    <div class="p-4 pb-28" id="detailContent"></div>

    <div id="actionButtons" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 shadow-lg flex gap-2" style="max-width: 428px; margin: 0 auto;">
        <button id="rejectBtn" class="flex-1 bg-red-500 text-white py-2.5 rounded-xl text-sm font-semibold btn-action hidden items-center justify-center gap-1">
            <i data-lucide="x-circle" class="w-4 h-4"></i>Tolak
        </button>
        <button id="approveBtn" class="flex-1 bg-green-500 text-white py-2.5 rounded-xl text-sm font-semibold btn-action hidden items-center justify-center gap-1">
            <i data-lucide="check-circle" class="w-4 h-4"></i>Setujui
        </button>
        <button onclick="history.back()" class="flex-1 bg-gray-200 text-bpr-dark py-2.5 rounded-xl text-sm font-semibold btn-action text-center">Tutup</button>
    </div>
</div>

<script>
    lucide.createIcons();

    // ========== GET PARAMS & DATA FROM LOCALSTORAGE ==========
    const urlParams = new URLSearchParams(window.location.search);
    const itemId = parseInt(urlParams.get('id'));
    
    let item = null;
    const storedData = localStorage.getItem('approvalData');
    
    if (storedData) {
        const allData = JSON.parse(storedData);
        item = allData.find(d => d.id === itemId);
    }

    if (!item) {
        alert("Data transaksi tidak ditemukan!");
        window.location.href = 'pembukaan-rekening.html';
    }

    // ========== RENDER DETAIL VIEW ==========
    function renderDetail() {
        const statusText = item.status === 'pending' ? 'Menunggu Persetujuan' : item.status === 'approved' ? 'Disetujui' : 'Ditolak';
        const statusClass = item.status === 'pending' ? 'status-pending' : item.status === 'approved' ? 'status-approved' : 'status-rejected';
        const dotClass = item.status === 'pending' ? 'dot-pending' : item.status === 'approved' ? 'dot-approved' : 'dot-rejected';
        
        let html = '';

        // ===== CONTAINER CARD UTAMA =====
        html += `
            <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-4">
                <div class="px-5 py-4 flex items-center gap-3">
                    <span class="header-status-dot ${dotClass}"></span>
                    <div>
                        <h2 class="text-base font-bold text-bpr-dark tracking-tight">${item.judul || 'Detail Transaksi'}</h2>
                        <p class="text-xs text-bpr-gray font-medium">${item.tanggalPengajuan || ''} ${item.waktuPengajuan ? '• ' + item.waktuPengajuan : ''}</p>
                    </div>
                </div>
                
                <hr class="section-divider">
        `;

        // ===== LOOP DETAIL DATA =====
        if (item.detailData && item.detailData.length > 0) {
            let isFirstSection = true;
            
            item.detailData.forEach(section => {
                if (!isFirstSection) {
                    html += `<hr class="section-divider">`;
                }
                isFirstSection = false;
                
                html += `<div class="px-5 py-3">`;
                
                if (section.title && section.title !== "") {
                    html += `<div class="card-title">${section.title}</div>`;
                }
                
                // --- KONDISI A: JIKA MULTI ARRAY (isTable === true) ---
                if (section.isTable && section.rows && section.rows.length > 0) {
                    
                    let totalDebet = 0;
                    let totalKredit = 0;
                    let hasJournal = false;
                    let countDebet = 0;
                    let countKredit = 0;

                    section.rows.forEach((row, rowIndex) => {
                        const keys = Object.keys(row).filter(k => k !== 'no');
                        
                        let headerTitle = '';
                        let headerSubtitle = '';
                        let headerBadge = '';
                        let keysToSkip = ['no'];

                        if (row.noRekening) {
                            headerTitle = row.noRekening;
                            headerSubtitle = row.namaRekening || '';
                            headerBadge = row.debetKredit || '';
                            keysToSkip.push('noRekening', 'namaRekening', 'debetKredit');
                        } else if (keys.length > 0) {
                            const firstKey = keys[0];
                            headerTitle = row[firstKey];
                            headerSubtitle = firstKey.replace(/([A-Z])/g, ' $1').replace(/^./, str => str.toUpperCase());
                            keysToSkip.push(firstKey);
                        }

                        // Akumulasi dinamis untuk jurnal debet / kredit
                        if (row.debetKredit && row.totalNominal) {
                            hasJournal = true;
                            const cleanNominal = parseFloat(row.totalNominal.replace(/[^\d]/g, '')) || 0;
                            
                            if (row.debetKredit.toLowerCase() === 'debet') {
                                totalDebet += cleanNominal;
                                countDebet++;
                            } else if (row.debetKredit.toLowerCase() === 'kredit') {
                                totalKredit += cleanNominal;
                                countKredit++;
                            }
                        }

                        const badgeClass = headerBadge && headerBadge.toLowerCase() === 'debet' ? 'badge-debet' : 'badge-kredit';

                        html += `
                            <div class="bg-[#F8FAFC] border border-slate-200 rounded-lg p-2 mb-1.5 last:mb-0">
                                <details class="group [&_summary::-webkit-details-marker]:hidden" ${rowIndex === 0 ? 'open' : ''}>
                                    <summary class="flex justify-between items-center cursor-pointer list-none select-none">
                                        <div class="flex items-center gap-2 flex-1 min-w-0">
                                            <span class="text-xs font-bold text-bpr-dark truncate tracking-tight">${headerTitle}</span>
                                            ${headerSubtitle ? `<span class="text-[11px] text-slate-400 font-medium truncate max-w-[140px]">(${headerSubtitle})</span>` : ''}
                                        </div>
                                        <div class="flex items-center gap-1.5 shrink-0">
                                            ${headerBadge ? `<span class="badge-dk ${badgeClass}">${headerBadge}</span>` : ''}
                                            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200 group-open:rotate-180"></i>
                                        </div>
                                    </summary>
                                    
                                    <div class="flex flex-col gap-1.5 pt-2 mt-2 border-t border-dashed border-slate-200 text-[11px]">
                                        ${Object.keys(row).map(key => {
                                            if (keysToSkip.includes(key)) return '';
                                            if (row[key] === undefined || row[key] === null || row[key] === "") return '';

                                            const formattedLabel = key
                                                .replace(/([A-Z])/g, ' $1')
                                                .replace(/^./, str => str.toUpperCase());

                                            const isLongText = ['narasi', 'alasanPersetujuan', 'keterangan'].includes(key) || String(row[key]).length > 30;

                                            if (isLongText) {
                                                return `
                                                    <div class="flex flex-col bg-white p-1.5 rounded border border-slate-100">
                                                        <span class="text-bpr-dark font-bold mb-0.5">${formattedLabel}</span>
                                                        <span class="text-slate-500 font-medium leading-relaxed" style="word-break: break-word;">${row[key]}</span>
                                                    </div>
                                                `;
                                            } else {
                                                return `
                                                    <div class="flex justify-between items-center py-0.5">
                                                        <span class="text-bpr-dark font-bold">${formattedLabel}</span>
                                                        <span class="text-slate-500 font-semibold text-right tracking-tight">${row[key]}</span>
                                                    </div>
                                                `;
                                            }
                                        }).join('')}
                                    </div>
                                </details>
                            </div>
                        `;
                    });

                    // --- FOOTER RINGKASAN JURNAL ---
                    if (hasJournal) {
                        // Hanya tampilkan status balance badge jika ada mutasi Debet DAN Kredit sekaligus
                        const showBalanceStatus = countDebet > 0 && countKredit > 0;
                        let balanceBadge = '';

                        if (showBalanceStatus) {
                            const isBalance = totalDebet === totalKredit;
                            balanceBadge = isBalance 
                                ? `<span class="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-md font-bold border border-green-200">BALANCE OK</span>`
                                : `<span class="bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-md font-bold border border-red-200 animate-pulse">UNBALANCE</span>`;
                        }

                        const formatIDR = (num) => 'Rp ' + num.toLocaleString('id-ID');

                        html += `
                            <div class="mt-3 p-3 bg-slate-50 rounded-xl border border-slate-200/60">
                                <div class="flex justify-between items-center mb-2 pb-2 border-b border-slate-200">
                                    <span class="text-xs font-bold text-bpr-dark tracking-tight">RINGKASAN JURNAL</span>
                                    ${balanceBadge}
                                </div>
                                <div class="flex flex-col gap-1 text-[11px]">
                                    <div class="flex justify-between items-center">
                                        <span class="text-slate-500 font-medium">Total Debet</span>
                                        <span class="font-bold text-sky-700 tracking-tight">${formatIDR(totalDebet)}</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-slate-500 font-medium">Total Kredit</span>
                                        <span class="font-bold text-amber-700 tracking-tight">${formatIDR(totalKredit)}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                } 
                // --- KONDISI B: JIKA REGULAR DATA ---
                else if (section.fields && section.fields.length > 0) {
                    html += `<div class="detail-grid">`;
                    section.fields.forEach(field => {
                        if (!field.value || field.value === "") return;
                        const isEmpty = field.value === "-";
                        
                        html += `
                            <div class="detail-item">
                                <span class="detail-label">${field.label}</span>
                                <span class="detail-value ${isEmpty ? 'empty' : ''}">${field.value}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                
                html += `</div>`;
            });
        }

        // ===== SECTION BADGE STATUS =====
        html += `
                <hr class="section-divider">
                <div class="px-5 py-3">
                    <div class="flex justify-between items-center py-2">
                        <span class="font-bold text-sm text-bpr-dark tracking-tight">STATUS</span>
                        <span class="status-badge-detail ${statusClass}">${statusText}</span>
                    </div>
        `;

        // Tampilkan log approval jika status sudah diproses
        if (item.status !== 'pending') {
            html += `
                    <div class="flex justify-between items-center py-2 border-t border-gray-50 text-xs">
                        <span class="font-bold text-bpr-dark">APPROVAL OLEH</span>
                        <span class="text-bpr-gray font-medium">${item.approvalBy || 'John Doe (Direksi)'}</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-t border-gray-50 text-xs">
                        <span class="font-bold text-bpr-dark">TANGGAL APPROVAL</span>
                        <span class="text-bpr-gray font-medium">${item.tanggalApproval || '-'}</span>
                    </div>
            `;
        }

        // ===== FIX KONDISI CATATAN AGAR BENAR-BENAR HILANG JIKA TIDAK ADA DI JSON =====
        // Kita cek: key-nya harus ada, tipenya bukan undefined, dan isinya bukan string kosong/null/strip
        // Ambil baris di bawah ini untuk lu lepas pasang (tinggal hapus tanda // di awal baris):
        
        if (item.hasOwnProperty('komentar') && item.komentar !== undefined && item.komentar !== null && item.komentar !== "" && item.komentar !== "-") {
            html += `
                    <div class="flex flex-col py-2 border-t border-gray-50 gap-1 mt-1 text-xs">
                        <span class="font-bold text-bpr-dark tracking-tight">CATATAN</span>
                        <p class="text-bpr-gray font-medium break-words leading-relaxed">
                            ${item.komentar}
                        </p>
                    </div>
            `;
        }


        // PENUTUP CARD UTAMA YANG BENAR
        html += `
                </div>
            </div>
        `;

        document.getElementById('detailContent').innerHTML = html;
        
        // Atur visibilitas button aksi bawah
        if (item.status === 'pending') {
            document.getElementById('rejectBtn').classList.remove('hidden');
            document.getElementById('rejectBtn').classList.add('flex');
            document.getElementById('approveBtn').classList.remove('hidden');
            document.getElementById('approveBtn').classList.add('flex');
        } else {
            document.getElementById('rejectBtn').classList.add('hidden');
            document.getElementById('approveBtn').classList.add('hidden');
        }
        
        lucide.createIcons();
    }

    // ========== ACTION CONTROLLER (APPROVE / REJECT) ==========
    function showConfirmPopup(title, message, onConfirm, type = 'approve') {
        const popup = document.createElement('div');
        popup.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6 modal-backdrop';
        let imageSrc = type === 'approve' ? 'images/confirmed.png' : 'images/reject.png';
        popup.innerHTML = `
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 text-center modal-animate">
                <img src="${imageSrc}" alt="${type}" class="w-48 h-48 mx-auto mb-4" onerror="this.src='https://placehold.co/80x80?text=❓'">
                <h3 class="text-sm font-bold text-slate-800 mb-2">${title}</h3>
                <p class="text-xs text-slate-500 mb-6">${message}</p>
                <div class="flex gap-3 text-xs">
                    <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-xl font-semibold">Batal</button>
                    <button id="confirmBtn" class="flex-1 ${type === 'approve' ? 'bg-bpr-approved' : 'bg-bpr-rejected'} text-white py-2.5 rounded-xl font-semibold shadow-md">Ya, ${type === 'approve' ? 'Setujui' : 'Tolak'}</button>
                </div>
            </div>
        `;
        document.body.appendChild(popup);
        popup.querySelector('#confirmBtn').onclick = () => { popup.remove(); onConfirm(); };
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-lg text-white text-xs font-semibold flex items-center gap-2';
        toast.style.background = message.includes('berhasil') ? '#10B981' : '#EF4444';
        toast.style.minWidth = '200px';
        toast.style.textAlign = 'center';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 1200);
    }

    function handleAction(statusTarget, successMsg, popupTitle, popupType) {
        showConfirmPopup(popupTitle, `${popupTitle} ini?`, () => {
            const allData = JSON.parse(localStorage.getItem('approvalData')) || [];
            const index = allData.findIndex(d => d.id === item.id);

            if (index !== -1) {
                allData[index].status = statusTarget;
                allData[index].approvalBy = "Alpa Gustiana (Direksi)";
                allData[index].tanggalApproval = new Date().toLocaleString('id-ID');
                
                if ('komentar' in allData[index]) {
                    allData[index].komentar = statusTarget === 'approved' ? 'Disetujui' : 'Ditolak';
                }
                
                localStorage.setItem('approvalData', JSON.stringify(allData));
            }
            
            showToast(successMsg);
            setTimeout(() => {
                window.location.href = 'pembukaan-rekening.html';
            }, 1200);
        }, popupType);
    }

    document.getElementById('approveBtn').addEventListener('click', () => {
        handleAction('approved', '✅ Transaksi berhasil disetujui!', 'Setujui Transaksi', 'approve');
    });
    
    document.getElementById('rejectBtn').addEventListener('click', () => {
        handleAction('rejected', '❌ Transaksi ditolak!', 'Tolak Transaksi', 'reject');
    });

    renderDetail();
</script>
</body>
</html>
