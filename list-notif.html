<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>M-Approval - Notifikasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bpr-yellow': '#FBBF24',
                        'bpr-dark': '#1F2937',
                        'bpr-gray': '#6B7280',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-container {
            max-width: 428px;
            margin: 0 auto;
            background: #F8FAFC;
            min-height: 100vh;
            position: relative;
        }
        .notification-item {
            transition: transform 0.2s ease;
            background: white;
            position: relative;
        }
        .notification-item.swipe-active {
            transform: translateX(-60px);
        }
        .swipe-delete {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 60px;
            background: #EF4444;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .notification-item.swipe-active .swipe-delete {
            opacity: 1;
            pointer-events: auto;
        }
        .checkbox-custom {
            width: 22px;
            height: 22px;
            border-radius: 8px;
            border: 2px solid #CBD5E1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .checkbox-custom.checked {
            background: #FBBF24;
            border-color: #FBBF24;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .popup-animate {
            animation: slideUp 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-backdrop {
            animation: fadeIn 0.2s ease;
        }
        .edit-mode .notification-card {
            transform: translateX(0) !important;
        }
        .edit-mode .swipe-delete {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-200 font-sans">

<div class="mobile-container">
    <div class="bg-white px-4 pt-4 pb-3 sticky top-0 z-40 shadow-sm border-b border-gray-100">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 active:opacity-50">
                <i data-lucide="arrow-left" class="w-5 h-5 text-bpr-dark"></i>
            </button>
            <div class="flex-1">
                <h1 class="text-lg font-bold text-bpr-dark">Notifikasi</h1>
                <p class="text-xs text-bpr-gray">Semua pemberitahuan Anda</p>
            </div>
            <div id="editModeBtn" class="hidden">
                <button id="enterEditMode" class="text-bpr-yellow text-sm font-semibold">Pilih</button>
            </div>
            <div id="batchDeleteBtn" class="hidden">
                <button id="deleteAllBtn" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-1">
                    <i data-lucide="trash-2" class="w-3 h-3"></i> Hapus
                </button>
            </div>
            <div id="cancelEditBtn" class="hidden">
                <button id="exitEditMode" class="text-bpr-gray text-sm font-semibold">Batal</button>
            </div>
        </div>
        
        <div class="mt-3">
            <div class="flex items-center gap-2">
                <i data-lucide="calendar" class="w-4 h-4 text-bpr-gray"></i>
                <input type="date" id="dateFilter" class="flex-1 text-sm border border-gray-200 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-bpr-yellow">
                <button id="resetFilterBtn" class="bg-gray-100 text-bpr-dark px-3 py-1.5 rounded-lg text-xs font-semibold">Reset</button>
            </div>
        </div>
        
        <div id="selectionBar" class="flex items-center justify-between mt-3 pt-2 border-t border-gray-100 hidden">
            <button id="selectAllBtn" class="text-xs font-semibold text-bpr-yellow flex items-center gap-1">
                <i data-lucide="check-square" class="w-3 h-3"></i> Pilih Semua
            </button>
            <span id="selectedCount" class="text-xs text-bpr-gray">0 dipilih</span>
        </div>
    </div>

    <div class="p-4 pb-24" id="contentArea">
        <div id="notificationList" class="space-y-2"></div>
        
        <div id="emptyState" class="text-center py-16 hidden">
            <img src="images/empty-data.png" alt="Tidak ada notifikasi" class="w-32 h-32 mx-auto mb-4" onerror="this.src='https://placehold.co/128x128?text=📭'">
            <h4 class="text-base font-bold text-slate-800 mb-1">Tidak Ada Notifikasi</h4>
            <p class="text-sm text-slate-400">Belum ada pemberitahuan baru</p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // ========== ADJUST DATA NOTIFIKASI REALISTIS (KONSUMSI PROPERTY CORE JSON) ==========
    let notifications = [
        { id: 1, noApproval: "TRX/2026/001", judul: "Tarik Tunai", namaPengaju: "Ahmad Firmansyah", tanggalPengajuan: "2026-06-16", waktuPengajuan: "09:30" },
        { id: 2, noApproval: "LND/2026/042", judul: "Transaksi General Ledger", namaPengaju: "Siti Rahmawati", tanggalPengajuan: "2026-06-16", waktuPengajuan: "10:15" },
        { id: 3, noApproval: "TRX/2026/001", judul: "Pembukaan Rek Deposito", namaPengaju: "Ahmad Firmansyah", tanggalPengajuan: "2026-06-17", waktuPengajuan: "09:30" },
        { id: 4, noApproval: "TRX/2026/001", judul: "Pembukaan Rekening Pinjaman", namaPengaju: "Ahmad Firmansyah", tanggalPengajuan: "2026-06-17", waktuPengajuan: "09:30" },
        { id: 5, noApproval: "TRX/2026/001", judul: "Pembukaan Rek Tabungan", namaPengaju: "Ahmad Firmansyah", tanggalPengajuan: "2026-06-17", waktuPengajuan: "09:30" }
    ];

    let currentFilterDate = "";
    let selectedItems = new Set();
    let isEditMode = false;
    let swipeTimeout = null;

    // Filter data by date
    function filterData() {
        let filtered = [...notifications];
        if (currentFilterDate) {
            filtered = filtered.filter(item => item.tanggalPengajuan === currentFilterDate);
        }
        return filtered;
    }

    // Render notification list
    function renderList() {
        const filtered = filterData();
        const container = document.getElementById('notificationList');
        const emptyState = document.getElementById('emptyState');
        const editModeBtn = document.getElementById('editModeBtn');
        
        if (filtered.length === 0) {
            container.innerHTML = '';
            emptyState.classList.remove('hidden');
            editModeBtn.classList.add('hidden');
            return;
        }
        
        emptyState.classList.add('hidden');
        editModeBtn.classList.remove('hidden');
        
        container.innerHTML = filtered.map(notif => `
            <div class="notification-item relative rounded-xl overflow-hidden shadow-sm border border-gray-100" data-id="${notif.id}">
                <div class="swipe-delete" onclick="event.stopPropagation(); deleteSingleNotif(${notif.id})">
                    <i data-lucide="trash-2" class="w-5 h-5 text-white"></i>
                </div>
                <div class="notification-card p-3 bg-white ${isEditMode ? 'cursor-pointer' : 'cursor-default'}" onclick="handleCardClick(${notif.id})">
                    <div class="flex gap-3">
                        ${isEditMode ? `
                            <div class="flex-shrink-0" onclick="event.stopPropagation(); toggleSelect(${notif.id})">
                                <div id="checkbox-${notif.id}" class="checkbox-custom ${selectedItems.has(notif.id) ? 'checked' : ''}">
                                    ${selectedItems.has(notif.id) ? '<i data-lucide="check" class="w-3 h-3 text-white"></i>' : ''}
                                </div>
                            </div>
                        ` : ''}
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="text-sm font-bold text-bpr-dark">${notif.judul}</h4>
                                <span class="text-[10px] text-bpr-gray">${notif.tanggalPengajuan} • ${notif.waktuPengajuan}</span>
                            </div>
                            <p class="text-xs text-bpr-gray mt-1">Pengajuan <span class="font-semibold text-slate-700">${notif.noApproval}</span> oleh ${notif.namaPengaju}.</p>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
        
        if (isEditMode) {
            selectedItems.forEach(id => {
                const checkbox = document.getElementById(`checkbox-${id}`);
                if (checkbox) {
                    checkbox.classList.add('checked');
                    checkbox.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-white"></i>';
                }
            });
        }
        
        lucide.createIcons();
        updateSelectedCount();
        
        if (!isEditMode) {
            document.querySelectorAll('.notification-item').forEach(item => {
                let startX = 0;
                let isSwiping = false;
                let hasSwiped = false;
                
                item.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isSwiping = true;
                    hasSwiped = false;
                    if (swipeTimeout) clearTimeout(swipeTimeout);
                    
                    document.querySelectorAll('.notification-item.swipe-active').forEach(el => {
                        if (el !== item) el.classList.remove('swipe-active');
                    });
                });
                
                item.addEventListener('touchmove', (e) => {
                    if (!isSwiping) return;
                    const currentX = e.touches[0].clientX;
                    const diff = startX - currentX;
                    if (diff > 30 && !hasSwiped) {
                        item.classList.add('swipe-active');
                        hasSwiped = true;
                    } else if (diff < -10 && hasSwiped) {
                        item.classList.remove('swipe-active');
                        hasSwiped = false;
                    }
                });
                
                item.addEventListener('touchend', () => {
                    isSwiping = false;
                    swipeTimeout = setTimeout(() => {
                        item.classList.remove('swipe-active');
                    }, 2000);
                });
            });
        }
    }
    
    // ========== HANYA MEMICU SELEKSI JIKA EDIT MODE AKTIF (TIDAK REDIRECT) ==========
    function handleCardClick(id) {
        if (isEditMode) {
            toggleSelect(id);
        }
    }
    
    function toggleSelect(id) {
        if (selectedItems.has(id)) {
            selectedItems.delete(id);
        } else {
            selectedItems.add(id);
        }
        
        const checkbox = document.getElementById(`checkbox-${id}`);
        if (checkbox) {
            if (selectedItems.has(id)) {
                checkbox.classList.add('checked');
                checkbox.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-white"></i>';
            } else {
                checkbox.classList.remove('checked');
                checkbox.innerHTML = '';
            }
            lucide.createIcons();
        }
        
        updateSelectedCount();
        updateBatchDeleteButton();
    }
    
    function selectAll() {
        const filtered = filterData();
        filtered.forEach(notif => {
            selectedItems.add(notif.id);
        });
        renderList();
    }
    
    function unselectAll() {
        selectedItems.clear();
        renderList();
    }
    
    function updateSelectedCount() {
        const count = selectedItems.size;
        document.getElementById('selectedCount').innerText = `${count} dipilih`;
    }
    
    function updateBatchDeleteButton() {
        const batchDeleteBtn = document.getElementById('batchDeleteBtn');
        if (selectedItems.size > 0) {
            batchDeleteBtn.classList.remove('hidden');
        } else {
            batchDeleteBtn.classList.add('hidden');
        }
    }
    
    function deleteSingleNotif(id) {
        const index = notifications.findIndex(n => n.id === id);
        if (index !== -1) {
            notifications.splice(index, 1);
            if (selectedItems.has(id)) selectedItems.delete(id);
            renderList();
            updateSelectedCount();
            updateBatchDeleteButton();
            
            if (notifications.length === 0 && isEditMode) {
                exitEditMode();
            }
        }
    }
    
    function showDeleteConfirmPopup(onConfirm) {
        const popup = document.createElement('div');
        popup.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-6 modal-backdrop';
        popup.innerHTML = `
            <div class="bg-white rounded-2xl w-full max-w-sm p-6 text-center popup-animate">
                <img src="images/delete.png" alt="Hapus" class="w-20 h-20 mx-auto mb-4" onerror="this.src='https://placehold.co/80x80?text=🗑️'">
                <h3 class="text-lg font-bold text-slate-800 mb-2">Hapus Notifikasi?</h3>
                <p class="text-sm text-slate-500 mb-6">${selectedItems.size} notifikasi akan dihapus secara permanen. Yakin ingin melanjutkan?</p>
                <div class="flex gap-3">
                    <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-slate-100 text-slate-700 py-2.5 rounded-xl font-semibold">Batal</button>
                    <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white py-2.5 rounded-xl font-semibold shadow-md">Ya, Hapus</button>
                </div>
            </div>
        `;
        document.body.appendChild(popup);
        
        popup.querySelector('#confirmDeleteBtn').onclick = () => {
            popup.remove();
            onConfirm();
        };
    }
    
    function deleteSelected() {
        if (selectedItems.size === 0) return;
        
        showDeleteConfirmPopup(() => {
            const idsToDelete = [...selectedItems];
            notifications = notifications.filter(n => !idsToDelete.includes(n.id));
            selectedItems.clear();
            renderList();
            updateSelectedCount();
            updateBatchDeleteButton();
            
            if (notifications.length === 0) {
                exitEditMode();
            }
        });
    }
    
    function enterEditMode() {
        isEditMode = true;
        selectedItems.clear();
        
        document.getElementById('editModeBtn').classList.add('hidden');
        document.getElementById('batchDeleteBtn').classList.remove('hidden');
        document.getElementById('cancelEditBtn').classList.remove('hidden');
        document.getElementById('selectionBar').classList.remove('hidden');
        
        renderList();
    }
    
    function exitEditMode() {
        isEditMode = false;
        selectedItems.clear();
        
        document.getElementById('editModeBtn').classList.remove('hidden');
        document.getElementById('batchDeleteBtn').classList.add('hidden');
        document.getElementById('cancelEditBtn').classList.add('hidden');
        document.getElementById('selectionBar').classList.add('hidden');
        
        renderList();
    }
    
    function resetFilter() {
        currentFilterDate = '';
        document.getElementById('dateFilter').value = '';
        if (isEditMode) exitEditMode();
        renderList();
    }
    
    document.getElementById('enterEditMode')?.addEventListener('click', enterEditMode);
    document.getElementById('exitEditMode')?.addEventListener('click', exitEditMode);
    document.getElementById('deleteAllBtn')?.addEventListener('click', deleteSelected);
    document.getElementById('selectAllBtn')?.addEventListener('click', () => {
        const filtered = filterData();
        if (selectedItems.size === filtered.length && filtered.length > 0) {
            unselectAll();
        } else {
            selectAll();
        }
    });
    document.getElementById('dateFilter')?.addEventListener('change', (e) => {
        currentFilterDate = e.target.value;
        if (isEditMode) exitEditMode();
        renderList();
    });
    document.getElementById('resetFilterBtn')?.addEventListener('click', resetFilter);
    
    renderList();
    updateBatchDeleteButton();
</script>
</body>
</html>
